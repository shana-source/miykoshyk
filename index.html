<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мій кошик</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f7; color: #1a1a1a; }
    .screen { max-width: 380px; margin: 0 auto; padding: 1rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .header h1 { font-size: 18px; font-weight: 500; }
    .store-tabs { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .store-tab { flex: 1; padding: 8px 4px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; background: #fff; color: #888; cursor: pointer; text-align: center; user-select: none; }
    .tab-r-on { border-color: #E8700A; background: #FEF0E6; color: #C45E00; font-weight: 500; }
    .tab-b-on { border-color: #1A7A3A; background: #E6F4EC; color: #145E2C; font-weight: 500; }
    .search-box { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; }
    .search-box input { border: none; background: transparent; font-size: 14px; color: #1a1a1a; flex: 1; outline: none; }
    .cat-filter { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 8px; scrollbar-width: none; }
    .cat-filter::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 4px 10px; border: 1px solid #ddd; border-radius: 20px; font-size: 11px; background: #fff; color: #888; cursor: pointer; white-space: nowrap; }
    .cat-btn.active { border-color: #1a1a1a; background: #1a1a1a; color: #fff; }
    .section-label { font-size: 12px; color: #888; margin-bottom: 8px; }
    .product-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem; max-height: 300px; overflow-y: auto; }
    .product-row { display: flex; gap: 6px; }
    .product-card { flex: 1; padding: 9px 10px; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; min-width: 0; }
    .product-card.card-r { border-left: 2.5px solid #E8700A; }
    .product-card.card-b { border-left: 2.5px solid #1A7A3A; }
    .pc-left { min-width: 0; flex: 1; }
    .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 1px 5px; border-radius: 3px; margin-bottom: 3px; }
    .badge-r { background: #FEF0E6; color: #C45E00; }
    .badge-b { background: #E6F4EC; color: #145E2C; }
    .pc-name { font-size: 12px; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-cat { font-size: 10px; color: #aaa; margin-top: 1px; }
    .pc-price { font-size: 12px; color: #888; margin-top: 2px; }
    .pc-price.cheaper { font-weight: 500; color: #1a1a1a; }
    .arrow-r { color: #C45E00; }
    .arrow-b { color: #145E2C; }
    .add-btn { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #ddd; background: #f5f5f5; color: #1a1a1a; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 6px; }
    .basket-section { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
    .basket-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .basket-title.t-r { color: #C45E00; }
    .basket-title.t-b { color: #145E2C; }
    .basket-empty { font-size: 12px; color: #aaa; padding: 4px 0 2px; }
    .basket-item { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
    .basket-item:last-child { border-bottom: none; }
    .bi-name { flex: 1; font-size: 12px; color: #1a1a1a; }
    .bi-qty { display: flex; align-items: center; gap: 4px; }
    .qty-btn { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ddd; background: #f5f5f5; font-size: 13px; cursor: pointer; color: #1a1a1a; display: flex; align-items: center; justify-content: center; }
    .qty-num { font-size: 12px; font-weight: 500; min-width: 14px; text-align: center; }
    .bi-price { font-size: 12px; color: #888; min-width: 44px; text-align: right; }
    .store-total { display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid #e5e5e5; }
    .store-total-label { font-size: 12px; color: #888; }
    .store-total-sum { font-size: 15px; font-weight: 500; }
  </style>
</head>
<body>
<div class="screen">
  <div class="header">
    <h1>Мій кошик</h1>
    <i class="ti ti-shopping-cart" style="font-size:20px;color:#888;"></i>
  </div>
  <div class="store-tabs">
    <div class="store-tab tab-r-on" id="tab-r" onclick="toggle('r')">Рукавичка</div>
    <div class="store-tab" id="tab-b" onclick="toggle('b')">Близенько</div>
  </div>
  <div class="search-box">
    <i class="ti ti-search" style="color:#aaa;font-size:16px;"></i>
    <input type="text" placeholder="Пошук товару..." id="searchInput" oninput="renderProducts()" />
  </div>
  <div class="cat-filter" id="catFilter"></div>
  <p class="section-label">Товари</p>
  <div class="product-list" id="productList"></div>
  <div id="basketR"></div>
  <div id="basketB"></div>
</div>

<script>
const catalog = [
  {name:"Бобові або цз макарони", cat:"Бобові та зернові", r:45, b:42},
  {name:"Горіхи мікс", cat:"Бобові та зернові", r:120, b:115},
  {name:"Мікс насіння", cat:"Бобові та зернові", r:65, b:62},
  {name:"Нут консервований", cat:"Бобові та зернові", r:48, b:45},
  {name:"Вівсянка плющена", cat:"Бобові та зернові", r:38, b:35},
  {name:"Кус-кус", cat:"Бобові та зернові", r:52, b:49},
  {name:"Цз лаваш", cat:"Бобові та зернові", r:32, b:30},
  {name:"М'ясо курки", cat:"М'ясо і риба", r:185, b:179},
  {name:"Фарш яловичина-свинина", cat:"М'ясо і риба", r:210, b:198},
  {name:"Філе стегна", cat:"М'ясо і риба", r:175, b:168},
  {name:"Авокадо", cat:"Овочі та фрукти", r:55, b:58},
  {name:"Буряк варений", cat:"Овочі та фрукти", r:28, b:25},
  {name:"Картопля 1кг", cat:"Овочі та фрукти", r:18, b:16},
  {name:"Кріп", cat:"Овочі та фрукти", r:12, b:10},
  {name:"Кукурудза консервована", cat:"Овочі та фрукти", r:38, b:35},
  {name:"Морква 1кг", cat:"Овочі та фрукти", r:24, b:22},
  {name:"Огірок 1кг", cat:"Овочі та фрукти", r:45, b:42},
  {name:"Пекінська капуста", cat:"Овочі та фрукти", r:38, b:35},
  {name:"Перець червоний 1кг", cat:"Овочі та фрукти", r:72, b:68},
  {name:"Петрушка, м'ята", cat:"Овочі та фрукти", r:14, b:12},
  {name:"Редис", cat:"Овочі та фрукти", r:22, b:20},
  {name:"Рукола", cat:"Овочі та фрукти", r:35, b:38},
  {name:"Цибуля 1кг", cat:"Овочі та фрукти", r:22, b:20},
  {name:"Цибуля синя", cat:"Овочі та фрукти", r:35, b:32},
  {name:"Цукіні", cat:"Овочі та фрукти", r:42, b:38},
  {name:"Яблуко 1кг", cat:"Овочі та фрукти", r:48, b:45},
  {name:"Ягоди", cat:"Овочі та фрукти", r:85, b:92},
  {name:"Банани 1кг", cat:"Овочі та фрукти", r:42, b:45},
  {name:"Йогурт грецький 2%", cat:"Яйця та молочка", r:68, b:65},
  {name:"Моцарела лайт", cat:"Яйця та молочка", r:75, b:72},
  {name:"Сир котедж", cat:"Яйця та молочка", r:62, b:58},
  {name:"Фета", cat:"Яйця та молочка", r:82, b:78},
  {name:"Яйця С1, 10шт", cat:"Яйця та молочка", r:65, b:63},
  {name:"Молоко 2.5%, 1л", cat:"Яйця та молочка", r:38, b:36},
  {name:"Сметана 20%, 400г", cat:"Яйця та молочка", r:52, b:49},
  {name:"Лимон", cat:"Приправи та спеції", r:18, b:16},
  {name:"Мед", cat:"Приправи та спеції", r:95, b:105},
  {name:"Оливки", cat:"Приправи та спеції", r:65, b:62},
  {name:"Оливкова олія", cat:"Приправи та спеції", r:185, b:178},
  {name:"Олія кокосова", cat:"Приправи та спеції", r:145, b:155},
  {name:"Орегано, тим'ян, часник, чилі", cat:"Приправи та спеції", r:28, b:25},
  {name:"Сухарі панірувальні", cat:"Приправи та спеції", r:32, b:30},
  {name:"Тахіні", cat:"Приправи та спеції", r:95, b:102},
];

const cats = ['Всі', ...new Set(catalog.map(p => p.cat))];
let activeCat = 'Всі';
let active = new Set(['r']);
let baskets = {r:{}, b:{}};

function buildCatFilter() {
  document.getElementById('catFilter').innerHTML = cats.map(c =>
    `<button class="cat-btn${c===activeCat?' active':''}" onclick="selectCat('${c}')">${c}</button>`
  ).join('');
}

function selectCat(c) {
  activeCat = c;
  buildCatFilter();
  renderProducts();
}

function toggle(s) {
  if (active.has(s)) { if (active.size === 1) return; active.delete(s); }
  else active.add(s);
  document.getElementById('tab-r').className = 'store-tab' + (active.has('r') ? ' tab-r-on' : '');
  document.getElementById('tab-b').className = 'store-tab' + (active.has('b') ? ' tab-b-on' : '');
  render();
}

function renderProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = catalog.filter(p =>
    p.name.toLowerCase().includes(q) &&
    (activeCat === 'Всі' || p.cat === activeCat)
  );
  const both = active.has('r') && active.has('b');
  if (both) {
    document.getElementById('productList').innerHTML = filtered.map(p => {
      const rCheaper = p.r < p.b, bCheaper = p.b < p.r;
      return `<div class="product-row">
        <div class="product-card card-r">
          <div class="pc-left">
            <span class="badge badge-r">Р</span>
            <div class="pc-name">${p.name}</div>
            <div class="pc-price${rCheaper?' cheaper':''}">${p.r} ₴${rCheaper?'<span class="arrow-r"> ↓</span>':''}</div>
          </div>
          <button class="add-btn" onclick="addItem('r','${p.name}')">+</button>
        </div>
        <div class="product-card card-b">
          <div class="pc-left">
            <span class="badge badge-b">Б</span>
            <div class="pc-name">${p.name}</div>
            <div class="pc-price${bCheaper?' cheaper':''}">${p.b} ₴${bCheaper?'<span class="arrow-b"> ↓</span>':''}</div>
          </div>
          <button class="add-btn" onclick="addItem('b','${p.name}')">+</button>
        </div>
      </div>`;
    }).join('');
  } else {
    const s = active.has('r') ? 'r' : 'b';
    const bc = s==='r'?'badge-r':'badge-b', cc=s==='r'?'card-r':'card-b', l=s==='r'?'Р':'Б';
    document.getElementById('productList').innerHTML = filtered.map(p => `
      <div class="product-row">
        <div class="product-card ${cc}" style="flex:1;">
          <div class="pc-left">
            <span class="badge ${bc}">${l}</span>
            <div class="pc-name">${p.name}</div>
            <div class="pc-price">${p[s]} ₴</div>
          </div>
          <button class="add-btn" onclick="addItem('${s}','${p.name}')">+</button>
        </div>
      </div>`).join('');
  }
}

function addItem(store, name) {
  baskets[store][name] = (baskets[store][name] || 0) + 1;
  renderBaskets();
}

function changeQty(store, name, d) {
  baskets[store][name] = (baskets[store][name] || 0) + d;
  if (baskets[store][name] <= 0) delete baskets[store][name];
  renderBaskets();
}

function renderOneBasket(s) {
  if (!active.has(s)) return '';
  const label = s==='r' ? 'Рукавичка' : 'Близенько';
  const tc = s==='r' ? 't-r' : 't-b';
  const items = Object.keys(baskets[s]);
  let total = 0;
  const p = (name) => catalog.find(p => p.name === name)?.[s] || 0;
  const rows = items.length === 0
    ? '<p class="basket-empty">Список порожній</p>'
    : items.map(name => {
        const sum = p(name) * baskets[s][name];
        total += sum;
        return `<div class="basket-item">
          <span class="bi-name">${name}</span>
          <div class="bi-qty">
            <button class="qty-btn" onclick="changeQty('${s}','${name}',-1)">−</button>
            <span class="qty-num">${baskets[s][name]}</span>
            <button class="qty-btn" onclick="changeQty('${s}','${name}',1)">+</button>
          </div>
          <span class="bi-price">${sum} ₴</span>
        </div>`;
      }).join('');
  const totalRow = items.length > 0
    ? `<div class="store-total"><span class="store-total-label">Разом</span><span class="store-total-sum">${total} ₴</span></div>`
    : '';
  return `<div class="basket-section">
    <div class="basket-title ${tc}"><i class="ti ti-building-store"></i> ${label}</div>
    ${rows}${totalRow}
  </div>`;
}

function renderBaskets() {
  document.getElementById('basketR').innerHTML = renderOneBasket('r');
  document.getElementById('basketB').innerHTML = renderOneBasket('b');
}

function render() { renderProducts(); renderBaskets(); }
buildCatFilter();
render();

if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
